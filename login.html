<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign in · EnergyCall Pro</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root {
  --bg: #0c0e12;
  --surface: #13161c;
  --surface2: #1a1e27;
  --surface3: #222733;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --accent: #00e5a0;
  --accent2: #00b87a;
  --accent-dim: rgba(0,229,160,0.12);
  --text: #f0f2f5;
  --text2: #8b919e;
  --text3: #525866;
  --danger: #ff5555;
  --danger-dim: rgba(255,85,85,0.12);
  --radius: 10px;
  --radius-lg: 14px;
  --shadow-sm: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px rgba(0,0,0,0.35);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  background-image: radial-gradient(ellipse 120% 80% at 50% -20%, rgba(0,229,160,0.07), transparent 55%);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.card {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 36px 36px;
  box-shadow: var(--shadow-sm), 0 0 0 1px rgba(0,229,160,0.04) inset;
}

.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}
.logo-dot {
  width: 9px; height: 9px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 12px var(--accent);
  flex-shrink: 0;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(0,229,160,0.9), 0 0 18px rgba(0,229,160,0.5); transform: scale(1); }
  50% { opacity: 0.35; box-shadow: 0 0 4px rgba(0,229,160,0.3), 0 0 6px rgba(0,229,160,0.1); transform: scale(0.78); }
}

.eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 8px;
}
.card-title {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
  margin-bottom: 28px;
}

.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text2);
  margin-bottom: 7px;
}
.field input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 10px 13px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,229,160,0.1);
}
.field input::placeholder { color: var(--text3); }

.submit-btn {
  width: 100%;
  margin-top: 8px;
  background: var(--accent);
  color: #0c0e12;
  border: none;
  border-radius: var(--radius);
  padding: 13px 14px;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.2px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
  box-shadow: 0 0 0 1px rgba(0,229,160,0.25), 0 4px 20px rgba(0,229,160,0.14);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.submit-btn:hover { background: #00ffb3; box-shadow: 0 0 0 1px rgba(0,229,160,0.35), 0 6px 24px rgba(0,229,160,0.2); }
.submit-btn:active { transform: scale(0.98); }
.submit-btn:disabled { background: var(--surface3); color: var(--text3); cursor: not-allowed; box-shadow: none; }

.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.2);
  border-top-color: #0c0e12;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  display: none;
}
.submit-btn.loading .spinner { display: block; }
.submit-btn.loading .btn-label { opacity: 0.7; }
@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  margin-top: 14px;
  background: var(--danger-dim);
  border: 1px solid rgba(255,85,85,0.2);
  border-radius: var(--radius);
  padding: 10px 13px;
  font-size: 13px;
  color: var(--danger);
  display: none;
}
.error-msg.visible { display: block; }

.footer-note {
  margin-top: 24px;
  font-size: 11px;
  color: var(--text3);
  text-align: center;
  line-height: 1.5;
}
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="logo">
      <div class="logo-dot"></div>
      EnergyCall Pro
    </div>
    <p class="eyebrow">Broker portal</p>
    <h1 class="card-title">Sign in</h1>
    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">
        <div class="spinner"></div>
        <span class="btn-label">Sign in</span>
      </button>
    </form>
    <div class="error-msg" id="errorMsg"></div>
    <p class="footer-note">Access restricted to authorised brokers only.</p>
    <p class="footer-note" style="margin-top:6px;font-size:10px;">Last updated: April 2026</p>
  </div>
</div>

<script>
(async function() {
  let _supabase = null;

  async function getClient() {
    if (_supabase) return _supabase;
    const r = await fetch('/api/config');
    const cfg = await r.json();
    _supabase = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
    return _supabase;
  }

  // If already signed in, go straight to the app
  try {
    const client = await getClient();
    const { data: { session } } = await client.auth.getSession();
    if (session) { window.location.href = '/'; return; }
  } catch (e) {}

  const form = document.getElementById('loginForm');
  const btn = document.getElementById('submitBtn');
  const errMsg = document.getElementById('errorMsg');

  function showError(msg) {
    errMsg.textContent = msg;
    errMsg.classList.add('visible');
  }
  function clearError() { errMsg.classList.remove('visible'); }
  function setLoading(on) {
    btn.disabled = on;
    btn.classList.toggle('loading', on);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showError('Please enter your email and password.'); return; }
    setLoading(true);
    try {
      const client = await getClient();
      const { error } = await client.auth.signInWithPassword({ email, password });
      if (error) { showError(error.message); setLoading(false); return; }
      window.location.href = '/';
    } catch (e) {
      showError('Something went wrong. Please try again.');
      setLoading(false);
    }
  });
})();
</script>
</body>
</html>
